<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Córdova · Control de Estaciones</title>
<link rel="icon" href="assets/logo.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2c1c0d" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <div class="hero-header">
      <div class="hero-glow"></div>
      <img class="hero-logo" src="assets/logo.png" alt="Córdova Restaurante" />
      <div class="hero-copy">
        <span class="eyebrow">Panel operativo · Cocina</span>
        <h1>Control de Estaciones</h1>
        <p>Córdova Restaurante · Parador</p>
      </div>
      <div class="clock">
        <span class="conn-pill" id="conn-status">·</span>
        <div class="time" id="clock-time">--:--</div>
        <div class="date" id="clock-date">--</div>
      </div>
    </div>

    <div class="card card-accent fade-in">
      <h2>Selecciona tu estación</h2>
      <p style="color:var(--brand-wood-dark); margin-top:-6px;">
        Deja esta página abierta en el PC de tu estación durante todo el turno para que suenen los avisos.
      </p>
      <div class="station-grid" id="station-grid"></div>
    </div>

    <div class="footer-note">
      ¿Eres del equipo de gerencia? <a href="dashboard.html">Entrar al dashboard →</a>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    function renderClock() {
      const now = new Date();
      document.getElementById("clock-time").textContent =
        String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock-date").textContent =
        now.toLocaleDateString("es-CO", { weekday: "long", day: "numeric", month: "long" });
    }
    renderClock();
    setInterval(renderClock, 1000 * 10);

    const grid = document.getElementById("station-grid");
    STATIONS.forEach((s) => {
      const a = document.createElement("a");
      a.className = "station-tile";
      a.href = `estacion.html?station=${s.id}`;
      a.innerHTML = `<span class="icon-badge"><span class="icon">${s.icon}</span></span><span class="name">${s.name}</span><span class="tile-arrow">Ingresar →</span>`;
      grid.appendChild(a);
    });
  </script>
</body>
</html>
