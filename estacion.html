<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Córdova · Checklist de Estación</title>
<link rel="icon" href="assets/logo.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#faf7f1" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="wrap">
    <div id="form-top"></div>
    <div class="hero-header">
      <div class="hero-glow"></div>
      <img class="hero-logo" src="assets/logo.png" alt="Córdova Restaurante" />
      <div class="hero-copy">
        <span class="eyebrow">Checklist de mise en place</span>
        <h1 id="station-title">Estación</h1>
        <p>Córdova Restaurante · Parador</p>
      </div>
      <div class="clock">
        <span class="conn-pill" id="conn-status">·</span>
        <div class="time" id="clock-time">--:--</div>
        <div class="date" id="clock-date">--</div>
      </div>
    </div>

    <div id="sticky-alert-slot"></div>
    <div id="queue-alert-slot"></div>

    <div class="card card-accent fade-in">
      <p><a href="index.html">← Cambiar de estación</a></p>
      <h2>Datos del turno</h2>
      <div class="field-row">
        <div class="field">
          <label>Responsable de la estación *</label>
          <select id="f-responsable">
            <option value="">Seleccionar responsable…</option>
          </select>
        </div>
        <div class="field">
          <label>Turno *</label>
          <select id="f-turno">
            <option value="">Seleccionar opción…</option>
            <option value="11:30">Mediodía (11:30 am)</option>
            <option value="18:30">Noche (6:30 pm)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Inspector / quien hace la inspección</label>
        <input type="text" id="f-inspector" placeholder="Opcional" />
      </div>
    </div>

    <div class="card fade-in">
      <h2>Checklist</h2>
      <div id="items-list"></div>
    </div>

    <div class="card fade-in">
      <div class="field">
        <label>Observaciones</label>
        <textarea id="f-observaciones" placeholder="Notas adicionales (opcional)"></textarea>
      </div>
      <div class="field">
        <label>Evidencia (foto) — opcional</label>
        <input type="file" id="f-evidencia" accept="image/*" />
      </div>
      <button class="btn btn-primary btn-block" id="btn-submit">Enviar checklist</button>
      <p id="submit-msg" style="text-align:center; margin-top:10px;"></p>
    </div>

    <div class="footer-note">
      Córdova Restaurante · Control interno de estaciones<br />
      <a href="#" id="btn-reset-today" style="font-size:0.78rem;">🔄 Reiniciar estado de hoy en esta estación</a>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-init.js"></script>

  <script src="js/data.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/estacion.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
